title: ECHO
description: Communication tool for human space analog missions
author: Dario Schor
email: schor@ieee.org
lang: en

remote_theme: rundocs/jekyll-rtd-theme

markdown: kramdown

kramdown:
  input: GFM
  math_engine: mathjax
  syntax_highlighter: rouge

plugins:
  - jemoji
  - jekyll-avatar
  - jekyll-mentions
  - jekyll-remote-theme

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules